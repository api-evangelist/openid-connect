aid: openid-connect
name: OpenID Connect
description: >-
  OpenID Connect (OIDC) is an identity authentication protocol that is an
  extension of OAuth 2.0. It enables clients to verify the identity of end-users
  and obtain basic profile information in a secure, standardized way using JSON
  Web Tokens (JWT).
